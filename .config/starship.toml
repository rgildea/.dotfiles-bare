# Starship prompt — tuned for Monaspace NF

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$ruby\
$rust\
$golang\
$cmd_duration\
$custom\
$line_break\
$character"""

right_format = "$time"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold #0D6678"

[git_branch]
format = "on [$symbol$branch]($style) "
symbol = " "
style = "bold #8F4673"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold #FB543F"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
stashed = "*${count}"
deleted = "✘${count}"
conflicted = "=${count}"

[character]
success_symbol = "[❯](bold #95C085)"
error_symbol = "[❯](bold #FB543F)"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold #FAC03B"

[time]
disabled = false
format = "[$time]($style)"
style = "dimmed #665C54"
time_format = "%H:%M"

[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold yellow"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
style = "bold green"

[nodejs]
format = "via [ $version]($style) "
style = "bold #95C085"

[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bold #FAC03B"

[ruby]
format = "via [ $version]($style) "
style = "bold #FB543F"

[rust]
format = "via [ $version]($style) "
style = "bold #FE8625"

[golang]
format = "via [ $version]($style) "
style = "bold #0D6678"

[gcloud]
disabled = true

[custom.gcloud]
description = "Show active GCP project when in a gcloud-related directory"
command = "gcloud config get-value project 2>/dev/null"
when = "test -f app.yaml || test -f cloudbuild.yaml || test -f .gcloudignore || find . -maxdepth 2 -name '*.tf' -quit 2>/dev/null | grep -q ."
symbol = "☁️  "
format = "on [$symbol$output]($style) "
style = "bold cyan"
