# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Darktooth color scheme
set -g status-style "bg=#1D2021,fg=#A89984"
set -g status-left "#[bg=#0D6678,fg=#1D2021,bold] #S #[bg=#1D2021,fg=#0D6678]"
set -g status-right "#[fg=#665C54] %H:%M  %d %b "
set -g status-left-length 30

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#32302F,fg=#FAC03B,bold] #I:#W "
set -g window-status-style "fg=#665C54"
set -g window-status-current-style "bg=#32302F,fg=#FAC03B,bold"

set -g pane-border-style "fg=#32302F"
set -g pane-active-border-style "fg=#0D6678"

set -g message-style "bg=#32302F,fg=#FAC03B"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
