# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows 1

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# set vi-mode
set-window-option -g mode-keys vi

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind "%" split-window -h -c "#{pane_current_path}"
# Darktooth color scheme
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-*:Tc"
set -g status-style "bg=#1D2021,fg=#A89984"
set -g status-left "#[bg=#0D6678,fg=#1D2021,bold] #S #[bg=#1D2021,fg=#0D6678]"
set -g status-right "#[fg=#665C54] %H:%M  %d %b "
set -g status-left-length 30
 
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#32302F,fg=#FAC03B,bold] #I:#W "
set -g window-status-style "fg=#665C54"
set -g window-status-current-style "bg=#32302F,fg=#FAC03B,bold"

set -g pane-border-style "fg=#32302F"
set -g pane-active-border-style "fg=#0D6678"

set -g message-style "bg=#32302F,fg=#FAC03B"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
